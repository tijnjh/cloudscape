<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script>
      // @ts-check
      "use strict";

      if (document) {
        /** @type {string} */
        const baseColor = localStorage["selected-base-color"] || "mist";
        /** @type {string} */
        const accentColor = localStorage["selected-accent-color"] || "emerald";

        const shades = /** @type {const} */ ([
          50, 100, 200, 300, 400, 500, 600, 700, 800, 900, 950,
        ]);

        /**
         * @param {string} name
         * @param {string} value
         */
        function setProperty(name, value) {
          document.documentElement.style.setProperty(name, value);
        }

        for (const shade of shades) {
          const reversedShade = 1000 - shade;

          setProperty(
            `--t-base-${shade}`,
            `var(--color-${baseColor}-${shade})`,
          );
          setProperty(
            `--t-base-${shade}-${reversedShade}`,
            `var(--color-${baseColor}-${shade}-${reversedShade})`,
          );
          setProperty(
            `--t-accent-${shade}`,
            `var(--color-${accentColor}-${shade})`,
          );
          setProperty(
            `--t-accent-${shade}-${reversedShade}`,
            `var(--color-${accentColor}-${shade}-${reversedShade})`,
          );
        }
      }
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
