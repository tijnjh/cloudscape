<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script>
      // @ts-check
      "use strict";

      if (document) {
        /** @type {string} */
        const baseColor = localStorage["selected-base-color"] || "mist";
        /** @type {string} */
        const accentColor = localStorage["selected-accent-color"] || "emerald";
        /** @type {"light" | "dark" | "system"} */
        const themeMode = localStorage["selected-theme-mode"] || "system";

        const shades = /** @type {const} */ ([
          50, 100, 200, 300, 400, 500, 600, 700, 800, 900, 950,
        ]);

        /**
         * @param {string} name
         * @param {string} value
         */
        function setVar(name, value) {
          document.body.style.setProperty(name, value);
        }

        for (const shade of shades) {
          setVar(`--t-base-${shade}`, `var(--color-${baseColor}-${shade})`);
          setVar(`--t-accent-${shade}`, `var(--color-${accentColor}-${shade})`);
        }

        setVar(
          "color-scheme",
          themeMode === "system" ? "light dark" : themeMode,
        );
      }
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
